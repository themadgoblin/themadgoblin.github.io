// ─── Bone List Panel ─────────────────────────────────────────────────────────

const boneListEl = document.getElementById('bone-list');
const boneCountEl = document.getElementById('bone-count');
let boneListRows = new Map();

function populateBoneList() {
  boneListEl.innerHTML = '';
  boneListRows.clear();
  const bones = getAllBones();
  if (bones.length === 0) { boneCountEl.textContent = ''; return; }
  boneCountEl.textContent = `(${bones.length})`;

  // Build parent depth for indentation
  const depthMap = new Map();
  for (const bone of bones) {
    let depth = 0, p = bone.parent;
    while (p && p.isBone) { depth++; p = p.parent; }
    depthMap.set(bone, depth);
  }

  // Sort: tree order (parents before children, alphabetical within same parent)
  const sorted = [...bones].sort((a, b) => {
    const chainA = [], chainB = [];
    let n = a; while (n) { chainA.unshift(n); n = n.parent && n.parent.isBone ? n.parent : null; }
    n = b; while (n) { chainB.unshift(n); n = n.parent && n.parent.isBone ? n.parent : null; }
    for (let i = 0; i < Math.min(chainA.length, chainB.length); i++) {
      if (chainA[i] !== chainB[i]) return chainA[i].name.localeCompare(chainB[i].name);
    }
    return chainA.length - chainB.length;
  });

  for (const bone of sorted) {
    const depth = depthMap.get(bone) || 0;
    const row = document.createElement('div');
    row.className = 'bone-row';

    const indent = document.createElement('span');
    indent.className = 'bone-indent';
    indent.style.width = (depth * 12) + 'px';
    indent.style.minWidth = (depth * 12) + 'px';

    const icon = document.createElement('span');
    icon.className = 'bone-icon';
    icon.textContent = '\u00B7';

    const lbl = document.createElement('span');
    lbl.className = 'bone-name';
    lbl.textContent = bone.name;
    lbl.title = bone.name;

    row.appendChild(indent);
    row.appendChild(icon);
    row.appendChild(lbl);

    row.addEventListener('click', () => {
      if (!skeletonVisible) {
        skelBtn.click();
      }
      selectBone(bone);
      highlightBoneRow(bone);
    });

    boneListEl.appendChild(row);
    boneListRows.set(bone, row);
  }
}

function highlightBoneRow(bone) {
  for (const [, r] of boneListRows) r.classList.remove('selected');
  if (bone && boneListRows.has(bone)) {
    const row = boneListRows.get(bone);
    row.classList.add('selected');
    row.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

// ─── Texture Application ────────────────────────────────────────────────────

function loadTextureFromBuffer(data, filename) {
  return new Promise((resolve, reject) => {
    const ext = filename.split('.').pop().toLowerCase();
    if (ext === 'tbody' || ext === 'dds') {
      try {
        const loader = new DDSLoader();
        const tex = loader.parse(data);
        const compTex = new THREE.CompressedTexture(
          tex.mipmaps, tex.width, tex.height, tex.format
        );
        compTex.mipmaps = tex.mipmaps;
        compTex.minFilter = tex.mipmapCount > 1 ? THREE.LinearMipmapLinearFilter : THREE.LinearFilter;
        compTex.magFilter = THREE.LinearFilter;
        compTex.needsUpdate = true;
        compTex.flipY = false;
        resolve(compTex);
      } catch (e) {
        reject(e);
      }
    } else {
      const blob = new Blob([data]);
      const url = URL.createObjectURL(blob);
      const tex = new THREE.TextureLoader().load(url, () => {
        URL.revokeObjectURL(url);
        resolve(tex);
      }, undefined, (err) => {
        URL.revokeObjectURL(url);
        reject(err);
      });
      tex.flipY = false;
      tex.colorSpace = THREE.SRGBColorSpace;
    }
  });
}

async function applyTexturesToMeshes(textureFileMap, neededTextures) {
  let applied = 0;
  const isMtbBased = neededTextures.length > 0 && neededTextures[0].source === 'mtb';

  if (isMtbBased) {
    // MTB-based: distribute textures across meshes/materials by order
    // For each material, the first matched texture is used as diffuse
    const loadedTexObjs = new Map();
    for (const needed of neededTextures) {
      const hashName = needed.baseName.toLowerCase();
      const hashNoExt = hashName.replace(/\.[^.]+$/, '');
      for (const [fname, data] of textureFileMap) {
        const candidateNoExt = fname.replace(/\.[^.]+$/, '');
        if (candidateNoExt === hashNoExt || fname === hashName) {
          try {
            const tex = await loadTextureFromBuffer(data, fname);
            loadedTexObjs.set(needed.hash || hashNoExt, tex);
            log(`  Loaded DDS texture: ${fname}`, 'success');
          } catch (e) {
            log(`  Failed to load "${fname}": ${e.message}`, 'error');
          }
          break;
        }
      }
    }

    if (loadedTexObjs.size === 0) {
      log('No .tbody textures could be matched. Filenames must be the hash (e.g. "51ea68bd3ca35a3d.tbody").', 'warn');
      return;
    }

    // Apply first loaded texture as diffuse to each mesh
    const texArr = [...loadedTexObjs.values()];
    const numMats = loadedMaterials.length || 1;
    const texPerMat = Math.max(1, Math.floor(texArr.length / numMats));

    for (let mi = 0; mi < loadedMeshes.length; mi++) {
      const matRef = loadedMeshMatRefs[mi];
      const matIdx = matRef >= 0 ? matRef : 0;
      const texIdx = Math.min(matIdx * texPerMat, texArr.length - 1);
      const tex = texArr[texIdx];
      if (!tex) continue;

      const mesh = loadedMeshes[mi];
      const oldMat = mesh.material;
      mesh.material = new THREE.MeshStandardMaterial({
        map: tex,
        roughness: 0.7,
        metalness: 0.1,
        side: THREE.DoubleSide,
        wireframe: wireframeOn
      });
      if (oldMat && !loadedMeshes.some((m, i) => i !== mi && m.material === oldMat)) {
        oldMat.dispose();
      }
      applied++;
      log(`  Applied texture ${texIdx} to mesh ${mi} (mat ${matIdx})`, 'success');
    }
  } else {
    // TexturePool-based: match by filename
    for (let mi = 0; mi < loadedMeshes.length; mi++) {
      const matRef = loadedMeshMatRefs[mi];
      if (matRef < 0 || matRef >= loadedMaterials.length) continue;
      const mat = loadedMaterials[matRef];

      for (const tRef of mat.textureRefs) {
        if (tRef < 0 || tRef >= loadedTextures.length) continue;
        const texEntry = loadedTextures[tRef];
        const baseName = texEntry.fileName.replace(/\\/g, '/').split('/').pop().toLowerCase();
        const baseNoExt = baseName.replace(/\.[^.]+$/, '');

        let matchedData = null, matchedFname = '';
        for (const [fname, data] of textureFileMap) {
          const candidateNoExt = fname.replace(/\.[^.]+$/, '');
          if (candidateNoExt === baseNoExt || fname === baseName) {
            matchedData = data; matchedFname = fname;
            break;
          }
        }

        if (matchedData) {
          try {
            const tex = await loadTextureFromBuffer(matchedData, matchedFname);
            const mesh = loadedMeshes[mi];
            const oldMat = mesh.material;
            mesh.material = new THREE.MeshStandardMaterial({
              map: tex, roughness: 0.7, metalness: 0.1,
              side: THREE.DoubleSide, wireframe: wireframeOn
            });
            if (oldMat && !loadedMeshes.some((m, i) => i !== mi && m.material === oldMat)) {
              oldMat.dispose();
            }
            applied++;
            log(`  Applied texture "${baseName}" to mesh ${mi}`, 'success');
            break;
          } catch (e) {
            log(`  Failed to load texture "${baseName}": ${e.message}`, 'error');
          }
        }
      }
    }
  }

  if (applied === 0) {
    log('No textures could be matched.', 'warn');
  } else {
    log(`Applied ${applied} texture(s)`, 'success');
  }
}

function showTexturePrompt(neededTextures) {
  const isMtb = neededTextures.length > 0 && neededTextures[0].source === 'mtb';
  const hasColorInfo = neededTextures.some(t => t.isColor !== undefined);
  const colorTextures = neededTextures.filter(t => t.isColor);
  const otherTextures = neededTextures.filter(t => !t.isColor);

  const container = document.createElement('div');
  container.className = 'tex-prompt';

  const title = document.createElement('div');
  title.style.cssText = 'color:#e94560;font-weight:600;margin-bottom:4px';
  title.textContent = `Model references ${neededTextures.length} texture(s)${isMtb ? ' (from MTB)' : ''}:`;
  container.appendChild(title);

  const list = document.createElement('div');
  list.className = 'tex-list';
  for (const t of neededTextures) {
    const item = document.createElement('div');
    if (hasColorInfo && t.isColor) {
      item.innerHTML = `<span style="color:#4ade80">\u25CF</span> ${t.baseName} <span style="color:#4ade80;font-size:9px">(color)</span>`;
    } else if (hasColorInfo) {
      item.innerHTML = `<span style="color:#707090">\u25CB</span> ${t.baseName} <span style="color:#707090;font-size:9px">(normal/spec/etc)</span>`;
    } else {
      item.textContent = t.baseName;
    }
    list.appendChild(item);
  }
  container.appendChild(list);

  const hint = document.createElement('div');
  hint.style.cssText = 'color:#a0a0c0;font-size:10px;margin-bottom:6px';
  if (isMtb) {
    hint.textContent = 'Select the matching .tbody files (DDS format). Filenames are the hex hashes above.';
  } else {
    hint.textContent = 'Select matching image files (any format: PNG, JPG, TGA, DDS, .tbody, etc). Matched by base filename.';
  }
  container.appendChild(hint);

  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = '.png,.jpg,.jpeg,.bmp,.tga,.dds,.tbody,.webp';
  fileInput.multiple = true;
  container.appendChild(fileInput);

  // Shared handler for loading textures from the file input
  async function handleFiles(filterColorOnly) {
    if (!fileInput.files.length) return;
    const targetTextures = filterColorOnly ? colorTextures : neededTextures;
    allBtn.disabled = true;
    if (colorBtn) colorBtn.disabled = true;
    (filterColorOnly ? colorBtn : allBtn).textContent = 'Loading...';
    const textureFileMap = new Map();
    for (const f of fileInput.files) {
      const data = await f.arrayBuffer();
      textureFileMap.set(f.name.toLowerCase(), data);
      log(`  Loaded file: ${f.name}`);
    }
    await applyTexturesToMeshes(textureFileMap, targetTextures);
    allBtn.textContent = 'Done';
    if (colorBtn) colorBtn.textContent = 'Done';
  }

  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;align-items:center';

  // "All Textures" button
  const allBtn = document.createElement('button');
  allBtn.textContent = isMtb ? 'Select All .tbody Files' : 'Select Texture Files';
  let allColorOnly = false;
  allBtn.addEventListener('click', () => { allColorOnly = false; fileInput.click(); });
  btnRow.appendChild(allBtn);

  // "Color Only" button (only shown when we have color classification)
  let colorBtn = null;
  if (hasColorInfo && colorTextures.length > 0 && otherTextures.length > 0) {
    colorBtn = document.createElement('button');
    colorBtn.textContent = `Color Only (${colorTextures.length})`;
    colorBtn.style.cssText = 'background:#2d6a4f';
    colorBtn.addEventListener('click', () => { allColorOnly = true; fileInput.click(); });
    btnRow.appendChild(colorBtn);
  }

  container.appendChild(btnRow);

  fileInput.addEventListener('change', () => handleFiles(allColorOnly));

  logEl.appendChild(container);
  logEl.scrollTop = logEl.scrollHeight;
}

// ─── Clear Scene ────────────────────────────────────────────────────────────

function clearScene() {
  // Remove skeleton helpers
  const helpers = [];
  scene.traverse(obj => { if (obj.isSkeletonHelper) helpers.push(obj); });
  for (const h of helpers) { h.dispose(); scene.remove(h); }

  const toRemove = [];
  scene.traverse(obj => { if (obj.isMesh || obj.isSkinnedMesh) toRemove.push(obj); });
  for (const obj of toRemove) {
    if (obj.isSkinnedMesh && obj.skeleton) obj.skeleton.dispose();
    obj.geometry.dispose();
    if (obj.material.map) obj.material.map.dispose();
    obj.material.dispose();
    scene.remove(obj);
  }
  for (const h of skeletonHelpers) { h.dispose(); scene.remove(h); }
  skeletonHelpers = [];
  skeletonVisible = false;
  skelBtn.classList.remove('toggle-on');

  deselectBone();
  if (boneMarker) { scene.remove(boneMarker); boneMarker = null; }
  if (boneTransformCtrl) { boneTransformCtrl.detach(); scene.remove(boneTransformCtrl); boneTransformCtrl.dispose(); boneTransformCtrl = null; }

  loadedMeshes = [];
  loadedMeshMatRefs = [];
  loadedMeshLabels = [];
  loadedMaterials = [];
  loadedTextures = [];
  meshListEl.innerHTML = '';
  boneListEl.innerHTML = '';
  boneListRows.clear();
  boneCountEl.textContent = '';
  exportGlbBtn.disabled = true;
  exportObjBtn.disabled = true;
}

// ─── File Loading ───────────────────────────────────────────────────────────

const octInput = document.getElementById('oct-file');
const bufInput = document.getElementById('buf-files');
const loadBtn = document.getElementById('btn-load');
const loadTexCb = document.getElementById('load-textures');

octInput.addEventListener('change', () => { loadBtn.disabled = !octInput.files.length; });

loadBtn.addEventListener('click', async () => {
  loadBtn.disabled = true;
  logEl.innerHTML = '';
  log('Loading OCT file...');

  try {
    const octBuf = await octInput.files[0].arrayBuffer();
    log(`OCT file: ${octInput.files[0].name} (${octBuf.byteLength} bytes)`);

    const companionFiles = {};
    if (bufInput.files.length) {
      for (const f of bufInput.files) {
        companionFiles[f.name.toLowerCase()] = await f.arrayBuffer();
        log(`  Companion: ${f.name} (${companionFiles[f.name.toLowerCase()].byteLength}B)`);
      }
    }

    log('Parsing OCT binary...');
    const root = parseOCT(octBuf);
    log(`Root: key="${root.key}" children=${root.children.length}`, 'success');

    for (const c of root.children) {
      if (c.atomType === 1) log(`  Pool: ${c.key} (${c.children.length} children)`);
    }

    log('Building meshes...');
    clearScene();
    const result = buildMeshes(root, companionFiles);
    const { meshes: newMeshes, meshMaterialRefs, meshLabels, totalVerts, totalTris, materials, textures, neededTextures, mtbData } = result;

    loadedMeshes = newMeshes;
    loadedMeshMatRefs = meshMaterialRefs;
    loadedMeshLabels = meshLabels;
    loadedMaterials = materials;
    loadedTextures = textures;

    for (const m of newMeshes) {
      if (wireframeOn) m.material.wireframe = true;
      scene.add(m);
    }

    populateMeshList();
    populateBoneList();
    exportGlbBtn.disabled = newMeshes.length === 0;
    exportObjBtn.disabled = newMeshes.length === 0;

    if (newMeshes.length > 0) {
      const box = new THREE.Box3();
      for (const m of newMeshes) box.expandByObject(m);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const dist = maxDim * 1.5;

      controls.target.copy(center);
      camera.position.set(center.x + dist * 0.5, center.y + dist * 0.5, center.z + dist);
      camera.near = maxDim * 0.001;
      camera.far = maxDim * 100;
      camera.updateProjectionMatrix();
      controls.update();

      gridHelper.position.y = box.min.y;
      const gridScale = Math.pow(10, Math.floor(Math.log10(maxDim)));
      gridHelper.scale.setScalar(gridScale / 10);
    }

    document.getElementById('stat-verts').textContent = `Vertices: ${totalVerts.toLocaleString()}`;
    document.getElementById('stat-tris').textContent = `Triangles: ${totalTris.toLocaleString()}`;
    document.getElementById('stat-meshes').textContent = `Meshes: ${newMeshes.length}`;
    document.getElementById('stat-mats').textContent = `Materials: ${materials.length}`;

    log(`Done! ${newMeshes.length} meshes, ${totalVerts.toLocaleString()} verts, ${totalTris.toLocaleString()} tris`, 'success');

    const skinnedMeshes = newMeshes.filter(m => m.isSkinnedMesh);
    const uniqueSkeletons = new Set(skinnedMeshes.map(m => m.skeleton).filter(Boolean));
    if (skinnedMeshes.length > 0) {
      const boneCount = skinnedMeshes[0]?.skeleton?.bones?.length || 0;
      log(`Skeleton: ${skinnedMeshes.length} skinned mesh(es), ${uniqueSkeletons.size} skeleton(s), ${boneCount} bones. Use Skeleton button to visualize. GLB export includes bones.`, 'success');
    }

    if (loadTexCb.checked && neededTextures.length > 0) {
      showTexturePrompt(neededTextures);
    } else if (neededTextures.length === 0 && !loadTexCb.checked) {
      log('Texture loading disabled (checkbox unchecked).');
    } else if (neededTextures.length === 0) {
      log('No textures referenced by this model. If using MTB textures, add the .mtb file to the Buffers input.');
    }
  } catch (e) {
    log(`Error: ${e.message}`, 'error');
    console.error(e);
  }

  loadBtn.disabled = false;
});
